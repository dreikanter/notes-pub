<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="author" content="{{.Config.AuthorName}}">
  <meta name="description" content="{{.Page.MetaDescription}}" />
  <meta name="generator" content="{{.Config.Generator}}" />
  <script>(function(){try{if(localStorage.getItem('theme')==='dark'){document.documentElement.classList.add('dark');}}catch(e){}})();</script>
  <title>{{if .Page.Title}}{{.Page.Title}} - {{end}}{{.Config.SiteName}}</title>
  {{if .Page.CanonicalPath}}
    <link rel="canonical" href="{{.Config.SiteRootURL}}/{{.Page.CanonicalPath}}">
  {{end}}
  <meta property="og:title" content="{{if .Page.Title}}{{.Page.Title}}{{else}}{{.Config.SiteName}}{{end}}" />
  <meta property="og:description" content="{{.Page.MetaDescription}}" />
  <meta property="og:type" content="{{if .Page.Title}}article{{else}}website{{end}}" />
  <meta property="og:url" content="{{.Config.SiteRootURL}}{{if .Page.CanonicalPath}}/{{.Page.CanonicalPath}}{{end}}" />
  <meta property="og:site_name" content="{{.Config.SiteName}}" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="{{if .Page.Title}}{{.Page.Title}}{{else}}{{.Config.SiteName}}{{end}}" />
  <meta name="twitter:description" content="{{.Page.MetaDescription}}" />
  <link rel="alternate" type="application/rss+xml" title="{{.Config.SiteName}}" href="{{.Config.FeedURL}}">
  <link rel="icon" href="{{.Config.FaviconDataURI}}">
  <style>{{.Config.StyleCSS}}{{.Config.HighlightCSS}}</style>
  <script src="https://cdn.counter.dev/script.js" data-id="d94a1231-14bd-47f9-ad32-cf1a9b40d2a5" data-utcoffset="2"></script>
</head>
<body class="bg-white dark:bg-slate-900">
  <div class="prose prose-slate dark:prose-invert prose-h1:text-4xl prose-headings:font-semibold container mx-auto !px-4 !pt-4 !pb-6">
    <nav class="!my-6 flex flex-row items-baseline justify-between">
      <a href="{{.Config.SiteRootPath}}">{{.Config.SiteName}}</a>
      <button id="theme-toggle" type="button" aria-label="Toggle theme" class="not-prose inline-flex items-center text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 cursor-pointer">
        <span class="hidden dark:inline-flex w-5 h-5">{{.Config.SunSVG}}</span>
        <span class="inline-flex dark:hidden w-5 h-5">{{.Config.MoonSVG}}</span>
      </button>
    </nav>
    <main>
      {{.Content}}
    </main>
    <footer class="!mt-6">
      <p class="not-prose text-slate-400">
        <a href="{{.Config.SiteRootURL}}" class="hover:underline hover:text-slate-700 dark:hover:text-slate-200">{{.Config.SiteDomain}}</a> &middot; <a href="{{.Config.FeedPath}}" class="hover:underline hover:text-slate-700 dark:hover:text-slate-200">RSS</a> &middot; <a href="{{.Config.LicenseURL}}" class="hover:underline hover:text-slate-700 dark:hover:text-slate-200">{{.Config.LicenseName}}</a>
      </p>
    </footer>
  </div>
  <script>document.getElementById('theme-toggle').addEventListener('click',function(){var d=document.documentElement.classList.toggle('dark');try{localStorage.setItem('theme',d?'dark':'light');}catch(e){}});</script>
</body>
</html>
